<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>预算管理 - 记账系统</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif; background: #f5f7fa; color: #333; }
        .sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); border: 0; }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        .header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 40px 20px; border-radius: 12px; margin-bottom: 20px; }
        .header h1 { font-size: 2em; margin-bottom: 10px; }
        .header p { opacity: 0.9; }
        .nav-links { display: flex; gap: 15px; margin-top: 20px; }
        .nav-links a { color: white; text-decoration: none; padding: 10px 20px; background: rgba(255,255,255,0.2); border-radius: 8px; transition: background 0.3s; }
        .nav-links a:hover { background: rgba(255,255,255,0.3); }
        .nav-links a.active { background: rgba(255,255,255,0.3); font-weight: bold; }
        .card { background: white; border-radius: 12px; padding: 20px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .card h2 { margin-bottom: 15px; color: #333; }
        .budget-input-group { display: flex; gap: 15px; align-items: center; margin-bottom: 20px; }
        .budget-input-group label { font-weight: 500; color: #666; }
        .budget-input-group input { padding: 8px 12px; border: 2px solid #e0e0e0; border-radius: 6px; font-size: 1em; width: 150px; }
        .budget-input-group input:focus { border-color: #667eea; outline: none; }
        .budget-input-group button { padding: 8px 20px; background: #667eea; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 1em; transition: background 0.3s; }
        .budget-input-group button:hover { background: #5568d3; }

        .yearly-summary { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 20px; border-radius: 12px; margin-bottom: 20px; display: none; }
        .yearly-summary-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; text-align: center; }
        .yearly-summary-item div:first-child { opacity: 0.9; font-size: 0.9em; }
        .yearly-summary-item div:last-child { font-size: 1.5em; font-weight: bold; margin-top: 5px; }

        .monthly-list { display: grid; gap: 10px; }
        .month-item { background: #f8f9fa; padding: 15px; border-radius: 8px; border-left: 4px solid #52C41A; }
        .month-item-grid { display: grid; grid-template-columns: 100px 1fr 150px; gap: 15px; align-items: center; }
        .month-name { font-weight: bold; color: #333; }
        .month-bar-container { background: #e0e0e0; height: 8px; border-radius: 4px; overflow: hidden; margin-top: 5px; }
        .month-bar { height: 100%; border-radius: 4px; transition: width 0.3s; }
        .month-status { font-size: 0.9em; font-weight: 500; }
        .month-remaining { text-align: right; }
        .month-remaining-label { font-size: 0.85em; color: #666; }
        .month-remaining-value { font-size: 1.2em; font-weight: bold; }

        .status-ok { border-left-color: #52C41A; }
        .status-warning { border-left-color: #FFC107; }
        .status-over { border-left-color: #FF6B6B; }
        .text-ok { color: #52C41A; }
        .text-warning { color: #FFC107; }
        .text-over { color: #FF6B6B; }
        .bg-ok { background: #52C41A; }
        .bg-over { background: #FF6B6B; }

        .error-message { background: #fff3cd; border: 1px solid #ffc107; color: #856404; padding: 12px; border-radius: 6px; margin-bottom: 15px; display: none; }

        /* 移动端适配 */
        @media (max-width: 768px) {
            .container { padding: 10px; }
            .header { padding: 20px 15px; border-radius: 8px; }
            .header h1 { font-size: 1.5em; }
            .nav-links { flex-wrap: wrap; gap: 8px; }
            .nav-links a { padding: 8px 12px; font-size: 0.85em; }
            .card { padding: 15px; }
            .budget-input-group { flex-direction: column; align-items: stretch; }
            .budget-input-group input { width: 100%; }
            .budget-input-group button { width: 100%; }
            .yearly-summary-grid { grid-template-columns: repeat(2, 1fr); }
            .month-item-grid { grid-template-columns: 1fr; }
            .month-remaining { text-align: left; }
        }

        @media (max-width: 480px) {
            .header h1 { font-size: 1.3em; }
            .nav-links a { padding: 6px 10px; font-size: 0.8em; }
        }
    </style>
    <link rel="icon" type="image/svg+xml" href="./favicon.svg">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>预算管理</h1>
            <p>追踪月度预算执行情况，掌握消费节奏</p>
            <div class="nav-links">
                <a href="./index.html">首页</a>
                <a href="./records.html">记录</a>
                <a href="./budget.html" class="active">预算</a>
                <a href="./stats.html">统计</a>
                <a href="./trip_allowance.html">差旅补助</a>
            </div>
        </div>

        <div id="error-message" class="error-message"></div>

        <div class="card">
            <h2>预算设置</h2>
            <div class="budget-input-group">
                <label for="budget-amount">月度预算：</label>
                <input type="number" id="budget-amount" value="3500" step="100">
                <span style="color: #666;">元</span>
                <button onclick="updateBudget()">更新预算</button>
            </div>
            <p style="color: #999; font-size: 0.9em;">仅统计个人账户的支出，家庭和公司账户不计入预算</p>
        </div>

        <div id="yearly-summary" class="yearly-summary">
            <div class="yearly-summary-grid">
                <div class="yearly-summary-item">
                    <div>年度总预算</div>
                    <div id="yearly-total-budget">¥0</div>
                </div>
                <div class="yearly-summary-item">
                    <div>实际支出</div>
                    <div id="yearly-actual">¥0</div>
                </div>
                <div class="yearly-summary-item">
                    <div>结余</div>
                    <div id="yearly-remaining">¥0</div>
                </div>
                <div class="yearly-summary-item">
                    <div>预算执行率</div>
                    <div id="yearly-usage-rate">0%</div>
                </div>
            </div>
        </div>

        <div class="card">
            <h2>月度预算执行</h2>
            <div id="monthly-list" class="monthly-list">
                <div style="text-align: center; padding: 40px; color: #999;">加载中...</div>
            </div>
        </div>
    </div>

    <script src="./static/config.js"></script>
    <script src="./static/utils.js"></script>
    <script src="./static/nocobase-api.js"></script>
    <link rel="stylesheet" href="./static/chat-widget.css">
    <script src="./static/learning-engine.js"></script>
    <script src="./static/agent-core.js"></script>
    <script src="./static/chat-widget.js"></script>
    <script>
        LearningEngine.init();
        ChatWidget.init();

        setActiveNav('./budget.html');

        let currentBudget = NOCOBASE_CONFIG.BUDGET_MONTHLY;

        function showError(message) {
            const errorEl = document.getElementById('error-message');
            errorEl.textContent = '❌ ' + message;
            errorEl.style.display = 'block';
            setTimeout(() => { errorEl.style.display = 'none'; }, 5000);
        }

        function updateBudget() {
            const amount = parseFloat(document.getElementById('budget-amount').value);
            if (amount > 0) {
                currentBudget = amount;
                loadMonthlyBudgetStats();
            } else {
                showError('请输入有效的预算金额');
            }
        }

        async function loadMonthlyBudgetStats() {
            try {
                const result = await NocobaseAPI.getRecords({ pageSize: 10000 });
                const allRecords = result.data || [];

                // 过滤个人账户支出
                const personalExpense = allRecords.filter(r =>
                    r.type === '支出' && (r.account === '个人' || !r.account)
                );

                const data = monthlyBudgetStats(personalExpense, currentBudget);

                if (data.yearly_summary) {
                    const summary = data.yearly_summary;
                    document.getElementById('yearly-summary').style.display = 'block';
                    document.getElementById('yearly-total-budget').textContent = formatMoney(summary.total_budget);
                    document.getElementById('yearly-actual').textContent = formatMoney(summary.total_actual);

                    const remainingEl = document.getElementById('yearly-remaining');
                    remainingEl.textContent = formatMoney(summary.remaining);
                    remainingEl.style.color = summary.remaining >= 0 ? '#52C41A' : '#FF6B6B';

                    document.getElementById('yearly-usage-rate').textContent = summary.usageRate.toFixed(1) + '%';
                }

                const listEl = document.getElementById('monthly-list');
                if (data.months.length === 0) {
                    listEl.innerHTML = '<div style="text-align: center; padding: 40px; color: #999;">暂无数据</div>';
                    return;
                }

                let html = '';
                data.months.forEach(month => {
                    const statusClass = month.status === '超支' ? 'status-over' : (month.status === '紧张' ? 'status-warning' : 'status-ok');
                    const statusTextClass = month.status === '超支' ? 'text-over' : (month.status === '紧张' ? 'text-warning' : 'text-ok');
                    const barClass = month.remaining >= 0 ? 'bg-ok' : 'bg-over';

                    html += `<div class="month-item ${statusClass}">
                        <div class="month-item-grid">
                            <div class="month-name">${month.month}</div>
                            <div>
                                <div style="display: flex; justify-content: space-between; font-size: 0.9em;">
                                    <span>${formatMoney(month.actual)} / ¥${month.budget.toLocaleString()}</span>
                                    <span class="${statusTextClass} month-status">${month.status}</span>
                                </div>
                                <div class="month-bar-container">
                                    <div class="month-bar ${barClass}" style="width: ${Math.min(month.usageRate, 100)}%;"></div>
                                </div>
                            </div>
                            <div class="month-remaining">
                                <div class="month-remaining-label">结余</div>
                                <div class="month-remaining-value" style="color: ${month.remaining >= 0 ? '#52C41A' : '#FF6B6B'};">${formatMoney(month.remaining)}</div>
                            </div>
                        </div>
                    </div>`;
                });

                listEl.innerHTML = html;
            } catch (error) {
                console.error('加载月度预算统计失败:', error);
                showError('网络错误: ' + error.message);
            }
        }

        loadMonthlyBudgetStats();
    </script>
</body>
</html>
