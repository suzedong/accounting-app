<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>差旅补助 - 记账本</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; }
        .sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); border: 0; }
        .container { max-width: 1400px; margin: 0 auto; }
        .header { background: white; border-radius: 16px; padding: 24px 32px; margin-bottom: 24px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        .header h1 { color: #1a202c; font-size: 28px; margin-bottom: 8px; }
        .header p { color: #718096; font-size: 14px; }
        .nav-links { display: flex; gap: 12px; margin-top: 20px; flex-wrap: wrap; }
        .nav-links a { color: #667eea; text-decoration: none; padding: 10px 20px; background: #f7fafc; border-radius: 8px; transition: all 0.3s; font-weight: 500; }
        .nav-links a:hover { background: #edf2f7; }
        .nav-links a.active { background: #667eea; color: white; font-weight: bold; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 24px; }
        .stat-card { background: white; border-radius: 16px; padding: 24px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        .stat-card h3 { color: #718096; font-size: 14px; margin-bottom: 12px; font-weight: 500; }
        .stat-card .value { font-size: 32px; font-weight: bold; color: #1a202c; }
        .stat-card .sub { font-size: 13px; color: #a0aec0; margin-top: 8px; }
        .stat-card.pending { border-left: 4px solid #f6ad55; }
        .stat-card.paid { border-left: 4px solid #68d391; }
        .stat-card.expired { border-left: 4px solid #fc8181; }
        .stat-card.total { border-left: 4px solid #667eea; }
        .content { background: white; border-radius: 16px; padding: 24px 32px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        .toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; gap: 16px; flex-wrap: wrap; }
        .filters { display: flex; gap: 12px; align-items: center; }
        .filters select { padding: 8px 16px; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 14px; background: white; cursor: pointer; }
        .btn { padding: 10px 20px; border: none; border-radius: 8px; font-size: 14px; cursor: pointer; transition: all 0.3s; font-weight: 500; }
        .btn-primary { background: #667eea; color: white; }
        .btn-primary:hover { background: #5568d3; }
        .table-container { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; }
        th { background: #f7fafc; padding: 12px 16px; text-align: left; font-size: 13px; font-weight: 600; color: #4a5568; border-bottom: 2px solid #e2e8f0; }
        td { padding: 16px; border-bottom: 1px solid #e2e8f0; font-size: 14px; color: #2d3748; }
        tr:hover { background: #f7fafc; }
        .status { display: inline-flex; align-items: center; gap: 6px; padding: 4px 12px; border-radius: 12px; font-size: 13px; font-weight: 500; }
        .status.paid { background: #c6f6d5; color: #22543d; }
        .status.pending { background: #feebc8; color: #744210; }
        .status.expired { background: #fed7d7; color: #742a2a; }
        .loading { text-align: center; padding: 40px; color: #718096; }
        .sync-info { font-size: 13px; color: #718096; margin-top: 16px; }

        @media (max-width: 768px) {
            .container { padding: 10px; }
            .header { padding: 16px; }
            .header h1 { font-size: 1.5em; }
            .nav-links { gap: 8px; }
            .nav-links a { padding: 8px 12px; font-size: 0.85em; }
            .content { padding: 16px; }
            .stats-grid { grid-template-columns: 1fr; }
            .toolbar { flex-direction: column; align-items: stretch; }
            .filters { flex-direction: column; }
            .filters select { width: 100%; }
            .btn-primary { width: 100%; }
        }
    </style>
    <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>差旅补助管理</h1>
            <p>同步和管理差旅补助数据，实时跟踪发放状态</p>
            <div class="nav-links">
                <a href="./index.html">首页</a>
                <a href="./records.html">记录</a>
                <a href="./budget.html">预算</a>
                <a href="./stats.html">统计</a>
                <a href="./trip_allowance.html" class="active">差旅补助</a>
            </div>
        </div>

        <div class="stats-grid" id="statsGrid">
            <div class="loading">加载中...</div>
        </div>

        <div class="content">
            <div class="toolbar">
                <div class="filters">
                    <label for="statusFilter" class="sr-only">状态筛选</label>
                    <select id="statusFilter" onchange="loadTrips()">
                        <option value="">全部状态</option>
                        <option value="✅ 已发放">已发放</option>
                        <option value="⏳ 待发放">待发放</option>
                        <option value="❌ 已过期">已过期</option>
                    </select>
                </div>
            </div>

            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>编号</th>
                            <th>出差时间</th>
                            <th>天数</th>
                            <th>差旅补助</th>
                            <th>交通补助</th>
                            <th>合计</th>
                            <th>状态</th>
                            <th>发放时间</th>
                            <th>备注</th>
                        </tr>
                    </thead>
                    <tbody id="tripTable">
                        <tr><td colspan="9" class="loading">加载中...</td></tr>
                    </tbody>
                </table>
            </div>

            <div class="sync-info" id="syncInfo"></div>
        </div>
    </div>

    <script type="module" src="../js/globals.js"></script>
    <script>
        function whenGlobalsReady(fn) {
            if (window.__globalsLoaded) { fn(); return; }
            const check = setInterval(() => { if (window.__globalsLoaded) { clearInterval(check); fn(); } }, 10);
        }

        async function loadStats() {
            try {
                const result = await NocobaseAPI.getBusinessTrips();
                const trips = result.data || [];

                console.log('差旅补助数据:', trips);

                const byStatus = {};
                let totalAmount = 0;

                for (const trip of trips) {
                    const status = trip.status || '未知';
                    if (!byStatus[status]) byStatus[status] = { count: 0, total: 0 };
                    byStatus[status].count++;
                    const amount = trip.total || 0;
                    byStatus[status].total += amount;
                    totalAmount += amount;
                }

                console.log('按状态统计:', byStatus);

                const pendingCount = byStatus['⏳ 待发放']?.count || 0;
                const pendingAmount = byStatus['⏳ 待发放']?.total || 0;
                const paidCount = byStatus['✅ 已发放']?.count || 0;
                const paidAmount = byStatus['✅ 已发放']?.total || 0;
                const expiredCount = byStatus['❌ 已过期']?.count || 0;
                const expiredAmount = byStatus['❌ 已过期']?.total || 0;

                document.getElementById('statsGrid').innerHTML = `
                    <div class="stat-card total">
                        <h3>补助总额</h3>
                        <div class="value">¥${totalAmount.toLocaleString('zh-CN', {minimumFractionDigits: 2, maximumFractionDigits: 2})}</div>
                        <div class="sub">共 ${trips.length} 次出差</div>
                    </div>
                    <div class="stat-card pending">
                        <h3>待发放</h3>
                        <div class="value">¥${pendingAmount.toLocaleString('zh-CN', {minimumFractionDigits: 2, maximumFractionDigits: 2})}</div>
                        <div class="sub">${pendingCount} 次出差</div>
                    </div>
                    <div class="stat-card paid">
                        <h3>已发放</h3>
                        <div class="value">¥${paidAmount.toLocaleString('zh-CN', {minimumFractionDigits: 2, maximumFractionDigits: 2})}</div>
                        <div class="sub">${paidCount} 次出差</div>
                    </div>
                    <div class="stat-card expired">
                        <h3>已过期</h3>
                        <div class="value">¥${expiredAmount.toLocaleString('zh-CN', {minimumFractionDigits: 2, maximumFractionDigits: 2})}</div>
                        <div class="sub">${expiredCount} 次出差</div>
                    </div>
                `;
            } catch (e) {
                console.error('加载统计失败:', e);
                document.getElementById('statsGrid').innerHTML = '<div class="loading">加载失败: ' + e.message + '</div>';
            }
        }

        async function loadTrips() {
            try {
                const statusValue = document.getElementById('statusFilter').value;
                const result = await NocobaseAPI.getBusinessTrips(statusValue || null);
                const trips = result.data || [];

                const tbody = document.getElementById('tripTable');

                if (trips.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="9" class="loading">暂无数据</td></tr>';
                    return;
                }

                tbody.innerHTML = trips.map(trip => `
                    <tr>
                        <td><code style="font-size:12px">${trip.trip_id || trip.id}</code></td>
                        <td>${formatDate(trip.start_date)} ~ ${formatDate(trip.end_date)}</td>
                        <td>${trip.days} 天</td>
                        <td>¥${(trip.trip_allowance || 0).toLocaleString('zh-CN', {minimumFractionDigits: 2})}</td>
                        <td>¥${(trip.transport_allowance || 0).toLocaleString('zh-CN', {minimumFractionDigits: 2})}</td>
                        <td><strong>¥${(trip.total || 0).toLocaleString('zh-CN', {minimumFractionDigits: 2})}</strong></td>
                        <td><span class="status ${getStatusClass(trip.status)}">${trip.status || '-'}</span></td>
                        <td>${trip.paid_date ? formatDate(trip.paid_date) : '-'}</td>
                        <td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${trip.notes || ''}">${trip.notes || '-'}</td>
                    </tr>
                `).join('');
            } catch (e) {
                console.error('加载记录失败:', e);
                document.getElementById('tripTable').innerHTML = '<tr><td colspan="9" class="loading">加载失败: ' + e.message + '</td></tr>';
            }
        }

        function formatDate(dateStr) {
            if (!dateStr) return '-';
            const date = new Date(dateStr);
            return date.toLocaleDateString('zh-CN', { year: 'numeric', month: '2-digit', day: '2-digit' });
        }

        function getStatusClass(status) {
            if (!status) return '';
            if (status.includes('已发放')) return 'paid';
            if (status.includes('待发放')) return 'pending';
            if (status.includes('已过期')) return 'expired';
            return '';
        }

        whenGlobalsReady(() => { loadStats(); loadTrips(); });
    </script>
</body>
</html>
