<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 记账 - 首页</title>
    <script src="../js/vendor/chart.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f5f7fa; }
        .sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); border: 0; }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        .header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 40px 20px; border-radius: 12px; margin-bottom: 20px; }
        .header h1 { font-size: 2em; margin-bottom: 10px; }
        .header p { opacity: 0.9; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 20px; }
        .stat-card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        .stat-card.expense { border-left: 4px solid #FF6B6B; }
        .stat-card.income { border-left: 4px solid #52C41A; }
        .stat-card.balance { border-left: 4px solid #1890FF; }
        .stat-card h3 { color: #666; font-size: 0.9em; margin-bottom: 10px; }
        .stat-card .value { font-size: 2em; font-weight: bold; color: #333; }
        .stat-card .count { color: #999; font-size: 0.9em; margin-top: 5px; }
        .chart-container { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); margin-bottom: 20px; }
        .chart-container h2 { margin-bottom: 20px; color: #333; }
        .nav-links { display: flex; gap: 15px; margin-top: 20px; }
        .nav-links a { color: white; text-decoration: none; padding: 10px 20px; background: rgba(255,255,255,0.2); border-radius: 8px; transition: background 0.3s; }
        .nav-links a:hover { background: rgba(255,255,255,0.3); }
        .nav-links a.active { background: rgba(255,255,255,0.3); font-weight: bold; }
        .category-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; }
        .category-item { background: #f8f9fa; padding: 15px; border-radius: 8px; display: flex; align-items: center; gap: 10px; }
        .category-item .icon { font-size: 1.5em; }
        .category-item .info { flex: 1; }
        .category-item .name { font-weight: 500; }
        .category-item .amount { color: #FF6B6B; font-weight: bold; }
        .loading { text-align: center; padding: 40px; color: #999; }

        /* 📱 移动端适配 */
        @media (max-width: 768px) {
            .container { padding: 10px; }
            .header { padding: 20px 15px; border-radius: 8px; }
            .header h1 { font-size: 1.5em; }
            .header p { font-size: 0.9em; }
            .nav-links { flex-wrap: wrap; gap: 8px; }
            .nav-links a { padding: 8px 12px; font-size: 0.85em; }
            .stats-grid { grid-template-columns: 1fr; gap: 15px; }
            .stat-card { padding: 15px; }
            .stat-card .value { font-size: 1.5em; }
            .chart-container { padding: 15px; }
            .chart-container h2 { font-size: 1em; }
            .category-list { grid-template-columns: 1fr; }
            .category-item { padding: 12px; }
        }

        @media (max-width: 480px) {
            .header h1 { font-size: 1.3em; }
            .nav-links a { padding: 6px 10px; font-size: 0.8em; }
            .stat-card .value { font-size: 1.3em; }
            .chart-container { padding: 12px; }
        }
    </style>
    <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>AI 记账</h1>
            <p>智能记账，轻松管理财务</p>
            <div class="nav-links">
                <a href="./index.html" class="active">首页</a>
                <a href="./records.html">记录</a>
                <a href="./budget.html">预算</a>
                <a href="./stats.html">统计</a>
                <a href="./trip_allowance.html">差旅补助</a>
            </div>
        </div>

        <div id="error-message" style="background:#fff3cd;color:#856404;padding:15px;border-radius:8px;margin-bottom:20px;display:none;"></div>

        <div class="stats-grid">
            <div class="stat-card expense">
                <h3>本月支出</h3>
                <div class="value" id="expense-total">¥0.00</div>
                <div class="count" id="expense-count">0 笔</div>
            </div>
            <div class="stat-card income">
                <h3>本月收入</h3>
                <div class="value" id="income-total">¥0.00</div>
                <div class="count" id="income-count">0 笔</div>
            </div>
            <div class="stat-card balance">
                <h3>本月结余</h3>
                <div class="value" id="balance">¥0.00</div>
                <div class="count" id="period-name">本月</div>
            </div>
        </div>

        <div class="chart-container">
            <h2>类别分析</h2>
            <div class="category-list" id="category-list">
                <div class="loading">加载中...</div>
            </div>
        </div>

        <div class="chart-container">
            <h2>账户分析</h2>
            <div class="stats-grid" id="account-analysis">
                <div class="loading">加载中...</div>
            </div>
        </div>

        <div class="chart-container">
            <h2>预算执行</h2>
            <div id="budget-analysis">
                <div class="loading">加载中...</div>
            </div>
        </div>
    </div>

    <script type="module" src="../js/globals.js"></script>
    <script>
        // 等待 globals 加载完成（ESM module 是 defer 的）
        function whenGlobalsReady(fn) {
            if (window.__globalsLoaded) { fn(); return; }
            const check = setInterval(() => { if (window.__globalsLoaded) { clearInterval(check); fn(); } }, 10);
        }

        // 初始化悬浮对话组件
        whenGlobalsReady(() => {
            LearningEngine.init();
            ChatWidget.init();
        });

        // 设置 active 导航
        // setActiveNav 需要等 globals 加载
        whenGlobalsReady(() => { setActiveNav('./index.html'); });

        // 全局记录缓存
        let allRecords = [];

        // 加载数据
        async function loadData() {
            const errorDiv = document.getElementById('error-message');

            try {
                // 获取所有记录用于前端统计计算
                const recordsResult = await NocobaseAPI.getRecordsForStats(
                    `${new Date().getFullYear()}-01-01 00:00:00`
                );
                allRecords = recordsResult.data || [];

                // 更新统计卡片
                const { dateFrom, periodName } = getDateRange('month');
                const monthRecords = allRecords.filter(r => r.datetime >= dateFrom);
                const totals = calcTotals(monthRecords);

                document.getElementById('expense-total').textContent = formatMoney(totals.expenseTotal);
                document.getElementById('expense-count').textContent = `${totals.expenseCount} 笔`;
                document.getElementById('income-total').textContent = formatMoney(totals.incomeTotal);
                document.getElementById('income-count').textContent = `${totals.incomeCount} 笔`;
                document.getElementById('balance').textContent = formatMoney(totals.incomeTotal - totals.expenseTotal);
                document.getElementById('period-name').textContent = periodName;

                const expenseByCategory = statsByCategory(monthRecords, '支出');
                renderCategoryList(expenseByCategory);

                // 加载账户分析和预算分析
                loadAccountAnalysis();
                loadBudgetAnalysis();

            } catch (error) {
                console.error('加载统计失败:', error);
                errorDiv.textContent = '加载失败: ' + error.message;
                errorDiv.style.display = 'block';
            }
        }

        // 加载账户分析
        async function loadAccountAnalysis() {
            try {
                const { dateFrom } = getDateRange('month');
                const monthRecords = allRecords.filter(r => r.datetime >= dateFrom);
                const accountStats = statsByAccount(monthRecords);

                const container = document.getElementById('account-analysis');
                const typeIcons = {'个人': '', '家庭': '', '公司': '', '其他': ''};

                let html = '';
                for (const [type, amount] of Object.entries(accountStats.byType)) {
                    const percentage = accountStats.total > 0 ? (amount / accountStats.total * 100) : 0;
                    html += `
                        <div class="stat-card">
                            <h3>${type}</h3>
                            <div class="value" style="color: #FF6B6B">${formatMoney(amount)}</div>
                            <div class="count">${percentage.toFixed(1)}%</div>
                        </div>
                    `;
                }

                html += `
                    <div class="stat-card" style="border-left: 4px solid #667eea">
                        <h3>总计</h3>
                        <div class="value" style="color: #667eea">${formatMoney(accountStats.total)}</div>
                        <div class="count">${accountStats.byAccount.length} 个账户</div>
                    </div>
                `;

                container.innerHTML = html;
            } catch (error) {
                console.error('加载账户分析失败:', error);
            }
        }

        // 加载预算分析
        function loadBudgetAnalysis() {
            try {
                const { dateFrom } = getDateRange('month');
                const monthRecords = allRecords.filter(r => r.datetime >= dateFrom && r.account === '个人');
                const budgetData = analyzeBudget(monthRecords, 'month', NOCOBASE_CONFIG.BUDGET_MONTHLY);

                const container = document.getElementById('budget-analysis');
                const statusColors = {'超支': '#FF6B6B', '紧张': '#FFC107', '正常': '#52C41A'};
                const statusColor = statusColors[budgetData.status] || '#666';

                container.innerHTML = `
                    <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 20px;">
                        <div style="background: #f8f9fa; padding: 15px; border-radius: 8px;">
                            <div style="color: #666; font-size: 0.9em; margin-bottom: 5px;">每月预算</div>
                            <div style="font-size: 1.5em; font-weight: bold; color: #667eea">¥3,500</div>
                        </div>
                        <div style="background: #f8f9fa; padding: 15px; border-radius: 8px;">
                            <div style="color: #666; font-size: 0.9em; margin-bottom: 5px;">已过天数</div>
                            <div style="font-size: 1.5em; font-weight: bold; color: #667eea">${budgetData.days} 天</div>
                        </div>
                        <div style="background: #f8f9fa; padding: 15px; border-radius: 8px;">
                            <div style="color: #666; font-size: 0.9em; margin-bottom: 5px;">剩余天数</div>
                            <div style="font-size: 1.5em; font-weight: bold; color: #667eea">${budgetData.remainingDays} 天</div>
                        </div>
                        <div style="background: #f8f9fa; padding: 15px; border-radius: 8px;">
                            <div style="color: #666; font-size: 0.9em; margin-bottom: 5px;">预算执行</div>
                            <div style="font-size: 1.5em; font-weight: bold; color: ${statusColor}">${budgetData.status}</div>
                        </div>
                    </div>

                    <div style="background: #f8f9fa; padding: 20px; border-radius: 8px; margin-bottom: 20px;">
                        <div style="display: flex; justify-content: space-between; margin-bottom: 10px;">
                            <span>已用：${formatMoney(budgetData.actualExpense)}</span>
                            <span style="font-weight: bold; color: ${statusColor}">${budgetData.usageRate.toFixed(1)}%</span>
                        </div>
                        <div style="background: #e0e0e0; height: 20px; border-radius: 10px; overflow: hidden;">
                            <div style="background: ${statusColor}; height: 100%; width: ${Math.min(budgetData.usageRate, 100)}%; transition: width 0.3s;"></div>
                        </div>
                        <div style="display: flex; justify-content: space-between; margin-top: 10px; font-size: 0.9em; color: #666;">
                            <span>剩余预算：${formatMoney(budgetData.remaining)}</span>
                            <span>日均消费：${formatMoney(budgetData.dailyAvg)}</span>
                        </div>
                    </div>

                    <div style="background: ${budgetData.status === '超支' ? '#ffe6e6' : (budgetData.status === '紧张' ? '#fff3cd' : '#e6f7e6')}; padding: 15px; border-radius: 8px; border-left: 4px solid ${statusColor};">
                        <div style="font-weight: bold; margin-bottom: 5px;">${budgetData.status === '超支' ? '预算超支' : (budgetData.status === '紧张' ? '预算紧张' : '预算正常')}</div>
                        <div style="font-size: 0.95em;">
                            ${budgetData.status === '超支'
                                ? `已超支 ${formatMoney(Math.abs(budgetData.remaining))}！本月剩余 ${budgetData.remainingDays} 天，建议立即控制非必要支出。`
                                : budgetData.status === '紧张'
                                ? `预算使用已达 ${budgetData.usageRate.toFixed(1)}%，剩余 ${formatMoney(budgetData.remaining)}。建议剩余 ${budgetData.remainingDays} 天内的日均消费控制在 ${formatMoney(budgetData.dailyRemaining)} 以内。`
                                : `预算执行正常！剩余 ${formatMoney(budgetData.remaining)}，剩余 ${budgetData.remainingDays} 天还可日均消费 ${formatMoney(budgetData.dailyRemaining)}。`
                            }
                        </div>
                    </div>
                `;
            } catch (error) {
                console.error('加载预算分析失败:', error);
            }
        }

        // 渲染分类列表
        function renderCategoryList(categories) {
            const container = document.getElementById('category-list');
            const icons = {
                '餐饮': '', '交通出行': '', '购物': '', '生活杂费': '',
                '家庭支出': '', '医疗': '', '娱乐': '', '学习': '',
                '人情往来': '', '零食水果': '', '数码': '', '服饰': '', '其他': ''
            };

            container.innerHTML = categories.map(c => `
                <div class="category-item">
                    <div class="icon">${icons[c.category] || ''}</div>
                    <div class="info">
                        <div class="name">${c.category}</div>
                        <div class="amount">${formatMoney(c.total)}</div>
                    </div>
                </div>
            `).join('');
        }

        // 页面加载时获取数据
        whenGlobalsReady(() => { loadData(); });
    </script>
</body>
</html>
